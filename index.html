<!DOCTYPE html>
<html lang="en">

<head>

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>SnowBallry</title>

	<style>

		body {
			margin: 0;
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			background: #0f172a;
			font-family: Arial, sans-serif;
			color: white;
			overflow: hidden;
		}

		.card {
			background: rgba(255,255,255,0.08);
			padding: 40px;
			border-radius: 24px;
			text-align: center;
			backdrop-filter: blur(10px);
			box-shadow: 0 0 40px rgba(0,0,0,0.4);
		}

		h1 {
			font-size: 42px;
			margin-bottom: 10px;
		}

		p {
			color: #cbd5e1;
			line-height: 1.7;
		}

		.status {
			margin-top: 20px;
			display: inline-flex;
			align-items: center;
			gap: 10px;
			background: rgba(34,197,94,0.15);
			padding: 12px 20px;
			border-radius: 999px;
			border: 1px solid rgba(34,197,94,0.4);
		}

		.dot {
			width: 12px;
			height: 12px;
			background: #22c55e;
			border-radius: 50%;
			box-shadow: 0 0 12px #22c55e;
			animation: pulse 1.5s infinite;
		}

		@keyframes pulse {

			0% {
				transform: scale(1);
				opacity: 1;
			}

			50% {
				transform: scale(1.3);
				opacity: 0.5;
			}

			100% {
				transform: scale(1);
				opacity: 1;
			}
		}

	</style>

</head>

<body>

	<div class="card">

		<h1>SnowBallry 🖤</h1>

		<p>
			Cute little bot.<br>
			Serious apocalypse business.
		</p>

		<div class="status">

			<div class="dot"></div>

			Bot is Online

		</div>

	</div>

</body>

</html>
