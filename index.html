<!DOCTYPE html>
<html lang="th">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>SnowBallry Bot</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: 'Poppins', sans-serif;
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			background: linear-gradient(135deg, #0f172a, #111827, #1e293b);
			color: white;
			overflow: hidden;
		}

		.background-glow {
			position: absolute;
			width: 500px;
			height: 500px;
			background: rgba(168, 85, 247, 0.18);
			filter: blur(120px);
			border-radius: 50%;
			animation: float 6s ease-in-out infinite;
		}

		@keyframes float {
			0%, 100% {
				transform: translateY(0px);
			}
			50% {
				transform: translateY(-20px);
			}
		}

		.card {
			position: relative;
			width: 90%;
			max-width: 520px;
			padding: 40px;
			border-radius: 28px;
			background: rgba(255, 255, 255, 0.06);
			backdrop-filter: blur(14px);
			border: 1px solid rgba(255,255,255,0.1);
			box-shadow: 0 10px 40px rgba(0,0,0,0.35);
			text-align: center;
		}

		.bot-avatar {
			width: 120px;
			height: 120px;
			border-radius: 50%;
			object-fit: cover;
			border: 4px solid rgba(255,255,255,0.15);
			margin-bottom: 20px;
			box-shadow: 0 0 25px rgba(168, 85, 247, 0.5);
		}

		h1 {
			font-size: 2.2rem;
			font-weight: 700;
			margin-bottom: 8px;
		}

		.subtitle {
			color: #cbd5e1;
			font-size: 1rem;
			margin-bottom: 30px;
			line-height: 1.7;
		}

		.status {
			display: inline-flex;
			align-items: center;
			gap: 10px;
			padding: 12px 22px;
			border-radius: 999px;
			background: rgba(34, 197, 94, 0.15);
			border: 1px solid rgba(34, 197, 94, 0.35);
			font-weight: 600;
			font-size: 1rem;
		}

		.dot {
			width: 12px;
			height: 12px;
			border-radius: 50%;
			background: #22c55e;
			box-shadow: 0 0 12px #22c55e;
			animation: pulse 1.5s infinite;
		}

		@keyframes pulse {
			0% {
				transform: scale(1);
				opacity: 1;
			}
			50% {
				transform: scale(1.3);
				opacity: 0.6;
			}
			100% {
				transform: scale(1);
				opacity: 1;
			}
		}

		.footer {
			margin-top: 28px;
			font-size: 0.9rem;
			color: #94a3b8;
		}
	</style>
</head>
<body>
	<div class="background-glow"></div>

	<div class="card">
		<img
			class="bot-avatar"
			src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png"
			alt="Bot Avatar"
		/>

		<h1>SnowBallry</h1>

		<p class="subtitle">
			Cute little bot. Serious apocalypse business.<br>
			Monitoring chaos, zombies, and sleepy survivors 🖤
		</p>

		<div class="status">
			<div class="dot"></div>
			Bot is currently online
		</div>

		<div class="footer">
			Project Zomboid Survival Assistant ⚡
		</div>
	</div>
</body>
</html>
